  <path d="M300,180 Q305,165 300,150 Q295,135 300,120" stroke="#bdbdbd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M350,185 Q355,170 350,155 Q345,140 350,125" stroke="#bdbdbd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Title -->
  <text x="300" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ff9800">★★★★★</text>
  <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#795548" font-weight="bold">Sopa (Mexican Soup)</text>
</svg>
