  <text x="400" y="42" text-anchor="middle" font-family="'Poppins',Arial,sans-serif" font-size="26" fill="#FF9800" letter-spacing="4">★★★★★</text>
  <text x="400" y="72" text-anchor="middle" font-family="'Poppins',Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.9)" font-weight="700" letter-spacing="1">SOPA DE POLLO — SOFIA'S MEXICAN FOOD</text>
</svg>