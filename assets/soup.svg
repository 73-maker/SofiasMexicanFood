  <path d="M400,205 Q408,190 402,173 Q396,157 404,143" stroke="rgba(220,200,180,0.4)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M460,208 Q468,193 462,176 Q456,160 464,146" stroke="rgba(220,200,180,0.4)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

