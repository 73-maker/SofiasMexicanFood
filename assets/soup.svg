  <path d="M265,278 Q285,268 310,275" stroke="#f5f5f5" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Tortilla strips on top -->
  <rect x="240" y="230" width="60" height="8" rx="4" fill="#f9a825" transform="rotate(-15,270,234)"/>
  <rect x="270" y="225" width="55" height="8" rx="4" fill="#ffb300" transform="rotate(10,297,229)"/>
  <rect x="310" y="235" width="50" height="8" rx="4" fill="#f9a825" transform="rotate(-8,335,239)"/>
