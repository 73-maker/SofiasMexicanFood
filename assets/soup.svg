  </defs>
  <rect width="600" height="400" fill="url(#bg7)"/>
  <!-- Bowl -->
  <ellipse cx="300" cy="260" rx="190" ry="100" fill="#fff8e1" stroke="#e0e0e0" stroke-width="3"/>
  <path d="M110,260 Q130,340 300,360 Q470,340 490,260" fill="#fff8e1" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Soup -->
