  <path d="M160,255 Q210,245 260,255 Q300,262 340,252 Q390,242 430,255" stroke="#ff6f00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M155,268 Q200,258 250,265 Q295,272 340,263 Q390,252 440,265" stroke="#ff6f00" stroke-width="1.5" fill="none" opacity="0.4"/>
