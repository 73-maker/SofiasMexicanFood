<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg6)"/>
  <!-- Plate -->
  <ellipse cx="300" cy="240" rx="220" ry="130" fill="white" stroke="#eeeeee" stroke-width="3"/>
  <!-- Taquito / Flauta rolls -->
  <!-- Roll 1 -->
  <rect x="140" y="185" width="195" height="40" rx="20" ry="20" fill="#f9a825" transform="rotate(-5,237,205)"/>
  <rect x="145" y="190" width="185" height="30" rx="15" ry="15" fill="#ffb300" transform="rotate(-5,237,205)"/>
  <!-- crispy lines -->
  <path d="M170,188 Q210,178 250,186 Q290,194 330,184" stroke="#e65100" stroke-width="1.5" fill="none" transform="rotate(-5,250,186)" opacity="0.6"/>
  <!-- Roll 2 -->
  <rect x="145" y="230" width="195" height="40" rx="20" ry="20" fill="#ffb300" transform="rotate(3,242,250)"/>
  <rect x="150" y="235" width="185" height="30" rx="15" ry="15" fill="#f9a825" transform="rotate(3,242,250)"/>
  <path d="M175,235 Q215,228 255,234 Q295,240 330,232" stroke="#e65100" stroke-width="1.5" fill="none" transform="rotate(3,252,234)" opacity="0.6"/>
  <!-- Roll 3 -->
  <rect x="270" y="190" width="185" height="38" rx="19" ry="19" fill="#ffa000" transform="rotate(6,362,209)"/>
  <rect x="275" y="195" width="175" height="28" rx="14" ry="14" fill="#ffb300" transform="rotate(6,362,209)"/>
  <!-- Toppings on top -->
  <!-- Lettuce shred -->
  <path d="M180,185 Q220,170 270,178 Q310,186 350,175 Q390,164 420,172" stroke="#66bb6a" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M185,180 Q225,168 270,176" stroke="#81c784" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Sour cream dollops -->
  <circle cx="220" cy="175" r="12" fill="white" opacity="0.9"/>
  <circle cx="280" cy="170" r="10" fill="white" opacity="0.85"/>
  <circle cx="350" cy="172" r="11" fill="white" opacity="0.9"/>
  <!-- Salsa dots -->
  <circle cx="250" cy="172" r="7" fill="#e53935" opacity="0.9"/>
  <circle cx="315" cy="168" r="6" fill="#e53935" opacity="0.85"/>
  <!-- Guacamole -->
  <ellipse cx="400" cy="300" rx="55" ry="30" fill="#558b2f" opacity="0.9"/>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Guacamole</text>
  <!-- Salsa side -->
  <ellipse cx="180" cy="305" rx="50" ry="27" fill="#e53935" opacity="0.9"/>
  <text x="180" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Salsa Roja</text>
  <!-- Title -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ff9800">★★★★★</text>
  <text x="300" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#795548" font-weight="bold">Taquitos &amp; Flautas</text>
</svg>
