<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffecb3"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  <circle cx="40" cy="40" r="20" fill="#c62828" opacity="0.2"/>
  <circle cx="560" cy="360" r="30" fill="#ff9800" opacity="0.15"/>
  <!-- Plate -->
  <ellipse cx="300" cy="230" rx="220" ry="130" fill="white" stroke="#eeeeee" stroke-width="3"/>
  <ellipse cx="300" cy="230" rx="200" ry="115" fill="none" stroke="#f5f5f5" stroke-width="2"/>
  <!-- Burrito body -->
  <rect x="150" y="165" width="300" height="130" rx="65" ry="65" fill="#f9a825"/>
  <rect x="155" y="170" width="290" height="120" rx="60" ry="60" fill="#ffb300"/>
  <!-- Filling peek -->
  <ellipse cx="300" cy="230" rx="130" ry="45" fill="#ff8f00" opacity="0.4"/>
  <!-- Fold lines -->
  <path d="M180,185 Q300,175 420,185" stroke="#f57f17" stroke-width="2" fill="none"/>
  <path d="M175,275 Q300,285 425,275" stroke="#f57f17" stroke-width="2" fill="none"/>
  <!-- End caps -->
  <ellipse cx="150" cy="230" rx="35" ry="65" fill="#ff8f00"/>
  <ellipse cx="450" cy="230" rx="35" ry="65" fill="#ff8f00"/>
  <!-- Ingredients peek -->
  <circle cx="230" cy="220" r="18" fill="#66bb6a"/>
  <circle cx="270" cy="225" r="15" fill="#e53935"/>
  <circle cx="310" cy="218" r="16" fill="#8d4e2a"/>
  <circle cx="350" cy="223" r="14" fill="#ffd600"/>
  <!-- Sauce drizzle -->
  <path d="M200,195 Q230,180 260,195 Q290,210 320,195 Q350,180 380,195" stroke="#c62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Sides: rice and beans -->
  <ellipse cx="120" cy="300" rx="55" ry="30" fill="#fff8e1" stroke="#e0e0e0" stroke-width="2"/>
  <circle cx="103" cy="297" r="4" fill="#ffcc02"/>
  <circle cx="115" cy="293" r="4" fill="#ffcc02"/>
  <circle cx="127" cy="297" r="4" fill="#ffcc02"/>
  <circle cx="135" cy="292" r="4" fill="#ffcc02"/>
  <circle cx="110" cy="303" r="4" fill="#ffcc02"/>
  <circle cx="122" cy="306" r="4" fill="#ffcc02"/>
  <!-- beans -->
  <ellipse cx="465" cy="300" rx="50" ry="28" fill="#5d4037" stroke="#4e342e" stroke-width="2" opacity="0.85"/>
  <ellipse cx="453" cy="297" rx="11" ry="8" fill="#795548"/>
  <ellipse cx="468" cy="293" rx="11" ry="8" fill="#795548"/>
  <ellipse cx="480" cy="300" rx="11" ry="8" fill="#795548"/>
  <ellipse cx="460" cy="306" rx="11" ry="8" fill="#795548"/>
  <!-- Title -->
  <text x="300" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ff9800">★★★★★</text>
  <text x="300" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#795548" font-weight="bold">Sofia's Burrito</text>
</svg>
